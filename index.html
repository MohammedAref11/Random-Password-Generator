<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>    
    <link rel="stylesheet" href="./style.css">
    <link rel="preload" href="./fonts/Karla-Variable.woff2" as="font" type="font/woff2" crossorigin> 
    <script defer src="main.js"></script>
</head>
<body>
    <main class="container">
        <button class="switch-theme-btn" id="light-mode-btn">Switch Theme</button>
        <h1 class="header-text">Generate a</h1>
        <h2 class="highlight-text">random password</h2>
        <p class="subheading-text">Never use a insecure password again.</p>
        <p class="password-length">Length: <span id="length-num">0</span></p>
        <input type="range" class="password-length-input" id="rangeInput" min="4" max="20" value="4" >
        <button id="generatePassBtn" class="generate-password-btn">Generate passwords</button>
        <hr>
        <div class="passwords-con">
            <div class="password">
                <p class="password-text password-1"></p>
                <svg class="copy-i-con" xmlns="http://www.w3.org/2000/svg" height="25" width="25" viewBox="0 0 448 512" id="copyEl1">
                    <path class="copy-icon" d="M384 336l-192 0c-8.8 0-16-7.2-16-16l0-256c0-8.8 7.2-16 16-16l133.5 0c4.2 0 8.3 1.7 11.3 4.7l58.5 58.5c3 3 4.7 7.1 4.7 11.3L400 320c0 8.8-7.2 16-16 16zM192 384l192 0c35.3 0 64-28.7 64-64l0-197.5c0-17-6.7-33.3-18.7-45.3L370.7 18.7C358.7 6.7 342.5 0 325.5 0L192 0c-35.3 0-64 28.7-64 64l0 256c0 35.3 28.7 64 64 64zM64 128c-35.3 0-64 28.7-64 64L0 448c0 35.3 28.7 64 64 64l192 0c35.3 0 64-28.7 64-64l0-16-48 0 0 16c0 8.8-7.2 16-16 16L64 464c-8.8 0-16-7.2-16-16l0-256c0-8.8 7.2-16 16-16l16 0 0-48-16 0z"/>
                </svg>
                <p id="copyMessage1" class="copy-message"></p>
            </div>
            <div class="password">
                <p class="password-text password-2"></p>
                <svg class="copy-i-con" xmlns="http://www.w3.org/2000/svg" height="25" width="25" viewBox="0 0 448 512" id="copyEl2">
                    <path class="copy-icon" d="M384 336l-192 0c-8.8 0-16-7.2-16-16l0-256c0-8.8 7.2-16 16-16l133.5 0c4.2 0 8.3 1.7 11.3 4.7l58.5 58.5c3 3 4.7 7.1 4.7 11.3L400 320c0 8.8-7.2 16-16 16zM192 384l192 0c35.3 0 64-28.7 64-64l0-197.5c0-17-6.7-33.3-18.7-45.3L370.7 18.7C358.7 6.7 342.5 0 325.5 0L192 0c-35.3 0-64 28.7-64 64l0 256c0 35.3 28.7 64 64 64zM64 128c-35.3 0-64 28.7-64 64L0 448c0 35.3 28.7 64 64 64l192 0c35.3 0 64-28.7 64-64l0-16-48 0 0 16c0 8.8-7.2 16-16 16L64 464c-8.8 0-16-7.2-16-16l0-256c0-8.8 7.2-16 16-16l16 0 0-48-16 0z"/>
                </svg>
                <p id="copyMessage2" class="copy-message"></p>
            </div>
        </div>
    </main>
</body>
</html>
